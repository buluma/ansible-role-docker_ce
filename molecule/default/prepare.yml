- become: true
  gather_facts: false
  hosts: all
  name: Prepare
  roles:
  - role: buluma.bootstrap
  - role: buluma.epel
  - role: buluma.buildtools
  - role: buluma.python_pip
  - role: buluma.core_dependencies
  tasks:
  - ansible.builtin.user:
      name: '{{ user }}'
    loop:
    - woody
    - buzz
    loop_control:
      loop_var: user
    name: Create test case users
